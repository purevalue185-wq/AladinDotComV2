<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | AladinDotCom</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo"><span class="logo-text">Aladin<span>DotCom</span></span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Top Deals</a>
        <a href="index.html#categories">Categories</a>
        <span id="userDisplay" style="display:none;"></span>
        <button class="btn login-btn" id="loginBtn" onclick="openModal('loginModal')">Sign In</button>
        <button class="btn btn-primary" id="signupBtn" onclick="openModal('signupModal')">Join Free</button>
        <button class="btn btn-outline" id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container" style="padding:1rem 0;">
    <div class="breadcrumb">
      <a href="index.html">Home</a> / <a href="products.html">Products</a> / <span id="breadcrumbTitle">Product Details</span>
    </div>
  </div>

  <section class="container">
    <div id="productDetailContent"></div>
  </section>

  <section class="container" style="margin-top:2rem;">
    <h3 style="margin-bottom:1rem;">Related Products</h3>
    <div class="products-grid" id="relatedProducts"></div>
  </section>

  <footer style="margin-top:3rem;">
    <div class="container footer-container">
      <div><strong>AladinDotCom</strong></div>
    </div>
    <div class="container copyright"><p>&copy; 2025 AladinDotCom</p></div>
  </footer>

  <div class="modal" id="loginModal">
    <div class="modal-content">
      <button class="close-modal" onclick="closeModal('loginModal')">&times;</button>
      <h2>Sign In</h2>
      <div class="auth-form">
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn btn-primary btn-full" onclick="loginWithEmail()">Sign In</button>
        <div class="divider">or</div>
        <button class="btn btn-outline btn-full" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Google</button>
      </div>
      <p style="text-align:center;">No account? <a href="#" onclick="closeModal('loginModal');openModal('signupModal')" style="color:var(--secondary);">Join Free</a></p>
    </div>
  </div>

  <div class="modal" id="signupModal">
    <div class="modal-content">
      <button class="close-modal" onclick="closeModal('signupModal')">&times;</button>
      <h2>Join Free</h2>
      <div class="auth-form">
        <input type="text" id="signupName" placeholder="Full Name">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <button class="btn btn-primary btn-full" onclick="signupWithEmail()">Create Account</button>
        <div class="divider">or</div>
        <button class="btn btn-outline btn-full" onclick="signupWithGoogle()"><i class="fab fa-google"></i> Google</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="product-detail.js"></script>
</body>
</html>
