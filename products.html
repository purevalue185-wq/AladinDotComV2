<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products | AladinDotCom</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .products-header { text-align:center; padding:2rem 0; }
    .products-header h2 { font-size:2.5rem; font-weight:800; text-transform:capitalize; }
    .products-header p { color:var(--gray-600); }
    .category-filter { display:flex; flex-wrap:wrap; gap:0.8rem; justify-content:center; margin-bottom:2rem; }
    .filter-btn { padding:0.6rem 1.5rem; border:2px solid var(--gray-200); background:white; border-radius:3rem; cursor:pointer; transition:all 0.3s; font-weight:500; }
    .filter-btn:hover, .filter-btn.active { background:var(--secondary); color:white; border-color:var(--secondary); }
    .search-box { max-width:500px; margin:0 auto 2rem; display:flex; background:white; border-radius:3rem; padding:0.3rem; box-shadow:0 4px 20px rgba(0,0,0,0.06); border:2px solid var(--gray-200); }
    .search-box input { flex:1; border:none; padding:0.8rem 1.5rem; border-radius:3rem; outline:none; }
    .search-box button { background:var(--secondary); color:white; border:none; padding:0.8rem 1.5rem; border-radius:3rem; cursor:pointer; font-weight:600; }
    .result-count { text-align:center; margin-bottom:1.5rem; color:var(--gray-600); }
    .result-count span { font-weight:700; color:var(--secondary); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">Aladin<span>DotCom</span></a>
      <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="products.html">All Products</a>
        <a href="index.html#contact">Contact</a>
        <span id="userDisplay" style="display:none;font-weight:600;color:var(--secondary);"></span>
        <button class="btn login-btn" id="loginBtn" onclick="openModal('loginModal')">Login</button>
        <button class="btn btn-primary" id="signupBtn" onclick="openModal('signupModal')">Sign Up</button>
        <button class="btn btn-outline" id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <section class="container section-padding">
    <div class="products-header">
      <h2 id="pageTitle">All Products</h2>
      <p id="pageSubtitle">Browse our complete wholesale catalog</p>
    </div>

    <div class="search-box">
      <input type="text" placeholder="Search products..." id="productSearchInput" value="">
      <button id="productSearchBtn"><i class="fas fa-search"></i> Search</button>
    </div>

    <div class="category-filter">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="electronics">Electronics</button>
      <button class="filter-btn" data-category="kitchen">Kitchen</button>
      <button class="filter-btn" data-category="beauty">Beauty</button>
      <button class="filter-btn" data-category="household">Household</button>
      <button class="filter-btn" data-category="packaging">Packaging</button>
      <button class="filter-btn" data-category="industrial">Industrial</button>
    </div>

    <div class="result-count" id="resultCount">Showing <span>0</span> products</div>

    <div class="products-grid" id="allProductsContainer">
      <div style="text-align:center;grid-column:1/-1;padding:3rem;">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--secondary);"></i>
        <p>Loading products...</p>
      </div>
    </div>
  </section>

  <footer>
    <div class="container footer-container">
      <div><strong>AladinDotCom</strong></div>
      <div class="footer-links"><a href="index.html">Home</a><a href="products.html">Products</a></div>
    </div>
    <div class="container copyright"><p>&copy; 2025 AladinDotCom</p></div>
  </footer>

  <!-- Login/Signup Modals -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal('loginModal')">&times;</span>
      <h2>Login</h2>
      <div class="auth-form">
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn btn-primary btn-full" onclick="loginWithEmail()">Login</button>
        <div class="divider"><span>or</span></div>
        <button class="btn btn-outline btn-full" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Google</button>
      </div>
      <p style="text-align:center;margin-top:1rem;">No account? <a href="#" onclick="closeModal('loginModal');openModal('signupModal')">Sign Up</a></p>
    </div>
  </div>

  <div class="modal" id="signupModal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal('signupModal')">&times;</span>
      <h2>Sign Up</h2>
      <div class="auth-form">
        <input type="text" id="signupName" placeholder="Full Name">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <button class="btn btn-primary btn-full" onclick="signupWithEmail()">Create Account</button>
        <div class="divider"><span>or</span></div>
        <button class="btn btn-outline btn-full" onclick="signupWithGoogle()"><i class="fab fa-google"></i> Google</button>
      </div>
      <p style="text-align:center;margin-top:1rem;">Have account? <a href="#" onclick="closeModal('signupModal');openModal('loginModal')">Login</a></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="products.js"></script>
</body>
</html>
