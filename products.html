<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Deals | AladinDotCom</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo"><span class="logo-text">Aladin<span>DotCom</span></span></a>
      <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="products.html">Top Deals</a>
        <a href="index.html#categories">Categories</a>
        <a href="index.html#contact">Contact</a>
        <div class="search-bar">
          <input type="text" placeholder="Search products..." id="productSearchInput" value="">
          <button id="productSearchBtn"><i class="fas fa-search"></i></button>
        </div>
        <span id="userDisplay" style="display:none;font-weight:600;font-size:0.85rem;"></span>
        <button class="btn login-btn" id="loginBtn" onclick="openModal('loginModal')">Sign In</button>
        <button class="btn btn-primary" id="signupBtn" onclick="openModal('signupModal')">Join Free</button>
        <button class="btn btn-outline" id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Top Deals Banner -->
  <section style="background:linear-gradient(135deg,#ff6a00,#ee0979);color:white;padding:2rem 0;">
    <div class="container">
      <h1 style="font-size:2rem;margin-bottom:0.3rem;">🔥 Top Deals</h1>
      <p style="font-size:1rem;opacity:0.9;">Limited time offers from verified suppliers</p>
    </div>
  </section>

  <!-- Deals Grid -->
  <section class="container section-padding">
    <div class="category-filter">
      <button class="filter-btn active" data-category="all">All Deals</button>
      <button class="filter-btn" data-category="electronics">Electronics</button>
      <button class="filter-btn" data-category="kitchen">Kitchen</button>
      <button class="filter-btn" data-category="beauty">Beauty</button>
      <button class="filter-btn" data-category="household">Household</button>
      <button class="filter-btn" data-category="packaging">Packaging</button>
      <button class="filter-btn" data-category="industrial">Industrial</button>
    </div>

    <div class="result-count" id="resultCount" style="margin-bottom:1.5rem;">Showing <strong>0</strong> products</div>

    <!-- Alibaba-style Product Cards -->
    <div class="deals-grid" id="allProductsContainer">
      <div style="text-align:center;grid-column:1/-1;padding:3rem;">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--secondary);"></i>
        <p>Loading deals...</p>
      </div>
    </div>
  </section>

  <footer>
    <div class="container footer-container">
      <div><strong>AladinDotCom</strong><p>B2B Wholesale Marketplace</p></div>
      <div class="footer-links"><a href="index.html">Home</a><a href="products.html">Top Deals</a></div>
    </div>
    <div class="container copyright"><p>&copy; 2025 AladinDotCom</p></div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="products.js"></script>
</body>
</html>
